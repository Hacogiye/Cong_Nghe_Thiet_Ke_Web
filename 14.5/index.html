<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Border & Border-radius</title>
<style>
  body { font-family: Arial; padding: 30px; background: #f8fafc; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }
  .shape {
    width: 120px; height: 120px;
    background: #0891b2; color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .square    { border-radius: 0; }
  .rounded   { border-radius: 12px; }
  .pill      { border-radius: 60px; }
  .circle    { border-radius: 50%; }
  .styles    {
    width: 200px; padding: 10px; margin-top: 20px;
    border-style: dashed; border-width: 3px; border-color: #ef4444;
  }
  /* outline không chiếm chỗ + không bo theo border-radius */
  .focus-demo {
    margin-top: 20px; padding: 8px 16px;
    border: 2px solid #cbd5e1; border-radius: 8px;
    outline: 3px solid #f59e0b;
    outline-offset: 4px;
  }
</style>
</head>
<body>
  <div class="row">
    <div class="shape square">0</div>
    <div class="shape rounded">12px</div>
    <div class="shape pill">60px</div>
    <div class="shape circle">50%</div>
  </div>
  <div class="styles">border-style: dashed</div>
  <div class="focus-demo">Outline (vàng) không cộng vào kích thước</div>
</body>
</html>
