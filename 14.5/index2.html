<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Pricing table</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: Arial, sans-serif;
            padding: 40px;
            margin: 0;
        }

        .pricing {
            display:
             flex;
            gap: 20px;
            max-width: 960px;
            margin: 0 auto;
        }

        .plan {
            flex: 1;
            padding: 24px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .05);
            text-align: center;
        }

        .plan.featured {
            border: 2px solid #0891b2;
            box-shadow: 0 8px 20px rgba(8, 145, 178, .15);
            transform: translateY(-6px);
        }

        .plan h3 {
            margin: 0 0 8px;
            color: #0e7490;
        }

        .price {
            font-size: 32px;
            font-weight: 700;
            margin: 12px 0;
            color: #0f172a;
        }

        .price small {
            font-size: 14px;
            color: #64748b;
            font-weight: 400;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 12px 0 20px;
        }

        ul li {
            padding: 6px 0;
            border-bottom: 1px solid #f1f5f9;
            color: #475569;
        }

        button {
            width: 100%;
            padding: 10px;
            border: 0;
            border-radius: 8px;
            background: #0891b2;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #0e7490;
        }
    </style>
</head>

<body>
    <div class="pricing">
        <div class="plan">
            <h3>Free</h3>
            <div class="price">0₫<small>/tháng</small></div>
            <ul>
                <li>1 dự án</li>
                <li>5 GB</li>
                <li>Email support</li>
            </ul>
            <button>Bắt đầu</button>
        </div>
        <div class="plan featured">
            <h3>Pro</h3>
            <div class="price">199K<small>/tháng</small></div>
            <ul>
                <li>10 dự án</li>
                <li>50 GB</li>
                <li>Ưu tiên support</li>
            </ul>
            <button>Chọn Pro</button>
        </div>
        <div class="plan">
            <h3>Enterprise</h3>
            <div class="price">Liên hệ</div>
            <ul>
                <li>Không giới hạn</li>
                <li>SLA 99.9%</li>
                <li>Account Manager</li>
            </ul>
            <button>Liên hệ</button>
        </div>
    </div>
</body>

</html>
