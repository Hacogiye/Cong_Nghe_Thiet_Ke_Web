<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Navbar 3 phần</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial; }
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 32px;
    background: #0e7490;
    color: white;
  }
  .logo { font-weight: bold; font-size: 1.25rem; letter-spacing: 1px; }
  .menu { list-style: none; display: flex; gap: 24px; }
  .menu a { color: white; text-decoration: none; padding: 6px 8px; }
  .menu a:hover { background: #155e75; border-radius: 4px; }
  .login {
    background: white; color: #0e7490;
    border: none; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; font-weight: bold;
  }
  .login:hover { background: #f59e0b; color: white; }
</style>
</head>
<body>
  <nav class="nav">
    <div class="logo">My Site</div>
    <ul class="menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <button class="login">Đăng nhập</button>
  </nav>
</body>
</html>
