<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        table {
            width: 80%;
            height: 170px;
            border-collapse: collapse;
            table-layout: auto;
        }

        table, th, td {
            border: 1px solid black;
        }

        td {
            vertical-align: middle;
            text-align: center;
        }

        tr:hover {
            background-color: rgb(250, 215, 230);
        }
    </style>
</head>
<body>
    <table>
    <tr>
        <th>Name</th>
        <th>Location</th>
    </tr>
    <tr>
        <td>James</td>
        <td>Chicago</td>
    </tr>
    <tr>
        <td>Robert</td>
        <td>New York</td>
    </tr>
</table>
</body>
</html>
