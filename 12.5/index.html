<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: Arial; padding: 16px; background: #f8fafc; }
.demo {
  width: 100%;
  height: 120px;
  margin-bottom: 12px;
  border: 2px solid #475569;
  /* Dùng SVG inline làm pattern nhỏ - tránh phụ thuộc network */
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><rect width='40' height='40' fill='%230ea5e9'/><circle cx='20' cy='20' r='8' fill='%23fef3c7'/></svg>");
}
h3 { margin: 12px 0 4px; color: #0e7490; }

.r1 { background-repeat: repeat; }       /* mặc định */
.r2 { background-repeat: repeat-x; }
.r3 { background-repeat: repeat-y; }
.r4 { background-repeat: no-repeat; }
.r5 { background-repeat: space; }
.r6 { background-repeat: round; }
</style>
</head>
<body>
  <h3>repeat (mặc định)</h3>
  <div class="demo r1"></div>

  <h3>repeat-x (chỉ ngang)</h3>
  <div class="demo r2"></div>

  <h3>repeat-y (chỉ dọc)</h3>
  <div class="demo r3"></div>

  <h3>no-repeat (1 lần)</h3>
  <div class="demo r4"></div>

  <h3>space (cách đều)</h3>
  <div class="demo r5"></div>

  <h3>round (scale fit)</h3>
  <div class="demo r6"></div>
</body>
</html>
